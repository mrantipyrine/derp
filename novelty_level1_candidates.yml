---
metadata:
  purpose: Level 1 novelty/event/statless equipment candidates that are reasonable
    bases for custom armor.yml, armor2.yml, and weapons.yml mappings.
  generated_from:
  - armor.yml
  - armor2.yml
  - weapons.yml
  selection_rules:
  - equipment.level == 1
  - flags include CanEquip
  - armor name/description looks cosmetic, event, blank, low DEF, or noncombat utility
  - weapon name/description is novelty/event/noncombat; ordinary starter weapons and
    GM-only weapons are excluded
  - baseline DEF/DMG/Delay alone is allowed; real combat stats are excluded unless
    the item is explicitly event/costume/utility
  notes:
  - This intentionally excludes most normal starter gear and high-stat level 1 items.
  - Blank weapons with item_type None are summarized separately because they are risky
    DAT bases and previously caused client issues when the asset mapping was wrong.
  counts:
    armor: 415
    weapons: 82
    high_risk_weapon_placeholders: 1019
